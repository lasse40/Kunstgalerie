<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kunstgalerie 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #111; }
    #joystick-zone {
      position: fixed; left: 0; bottom: 0;
      width: 45vw; height: 45vh; z-index: 999;
    }
    #titel {
      position: fixed; top: 0; left: 0; right: 0;
      text-align: center; padding: 10px;
      background: linear-gradient(rgba(0,0,0,.65), transparent);
      color: #d4b96a; font: normal 18px/1 Georgia, serif;
      letter-spacing: .2em; text-transform: uppercase;
      pointer-events: none; z-index: 100;
    }
    #hint {
      position: fixed; bottom: 10px; right: 10px;
      background: rgba(0,0,0,.5); color: rgba(255,255,255,.75);
      padding: 8px 12px; border-radius: 6px;
      font: 12px/1.8 sans-serif;
      pointer-events: none; z-index: 100;
    }
    #info-panel {
      position: fixed; top: 50%; right: -360px;
      transform: translateY(-50%);
      width: 320px; max-height: 80vh;
      background: rgba(15,11,7,0.95);
      border-left: 2px solid #d4b96a;
      color: #e8e4d8; padding: 24px 20px;
      z-index: 600; overflow-y: auto;
      transition: right 0.35s ease;
      font-family: Georgia, serif;
    }
    #info-panel.offen { right: 0; }
    #info-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none;
      color: #d4b96a; font-size: 20px;
      cursor: pointer; line-height: 1;
    }
    #info-panel h3 {
      color: #d4b96a; font-size: 1rem;
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 12px;
    }
    #info-panel p {
      font-size: 0.82rem; line-height: 1.7;
      color: #c8c0ae;
    }
    #info-img {
      width: 100%; border-radius: 3px;
      margin-bottom: 14px; display: none;
    }
    #klick-hint {
      position: fixed; bottom: 52px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55); color: rgba(255,255,255,.8);
      padding: 5px 14px; border-radius: 20px;
      font: 11px sans-serif; pointer-events: none;
      z-index: 100; opacity: 0;
      transition: opacity 0.4s;
    }
    #klick-hint.sichtbar { opacity: 1; }
    #ladescreen {
      position: fixed; inset: 0; z-index: 2000;
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.6s ease;
    }
    #ladescreen.fertig { opacity: 0; pointer-events: none; }
    #ladescreen h2 {
      color: #d4b96a; font: normal 1.6rem Georgia, serif;
      letter-spacing: .2em; text-transform: uppercase;
    }
    #ladescreen p {
      color: #8a7a5a; font: 0.85rem sans-serif;
      letter-spacing: .1em;
    }
    .lade-balken-wrap {
      width: 220px; height: 4px;
      background: #3a3020; border-radius: 2px; overflow: hidden;
    }
    .lade-balken {
      height: 100%; width: 0%;
      background: #d4b96a; border-radius: 2px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>

<!-- ===== A-FRAME MOVEMENT COMPONENT (vor <a-scene> registrieren!) ===== -->
<script>
// ===== EIGENE TOUCH/MAUS-STEUERUNG (ersetzt look-controls) =====
// Linke Hälfte: Joystick (nipplejs) · Rechte Hälfte: Schauen per Wischen
// Beide gleichzeitig möglich (Multi-Touch).
AFRAME.registerComponent('touch-look', {
  init: function () {
    this.yaw   = 0;   // Grad – horizontale Drehung
    this.pitch = 0;   // Grad – vertikale Drehung

    this.lookId  = null;  // Touch-ID der Schauen-Geste
    this.lastX   = 0;
    this.lastY   = 0;

    this.mouseDown = false;
    this.lastMX    = 0;
    this.lastMY    = 0;

    this._ts = (e) => {
      if (this.lookId !== null) return;
      for (const t of e.changedTouches) {
        // Nur Touches auf der rechten Bildschirmhälfte (>45vw)
        if (t.clientX > window.innerWidth * 0.45) {
          this.lookId = t.identifier;
          this.lastX  = t.clientX;
          this.lastY  = t.clientY;
          break;
        }
      }
    };
    this._tm = (e) => {
      if (this.lookId === null) return;
      for (const t of e.changedTouches) {
        if (t.identifier === this.lookId) {
          this.yaw   -= (t.clientX - this.lastX) * 0.35;
          this.pitch -= (t.clientY - this.lastY) * 0.35;
          this.pitch  = Math.max(-80, Math.min(80, this.pitch));
          this.lastX  = t.clientX;
          this.lastY  = t.clientY;
          break;
        }
      }
    };
    this._te = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === this.lookId) { this.lookId = null; break; }
      }
    };
    this._md = (e) => { this.mouseDown = true;  this.lastMX = e.clientX; this.lastMY = e.clientY; };
    this._mm = (e) => {
      if (!this.mouseDown) return;
      this.yaw   -= (e.clientX - this.lastMX) * 0.3;
      this.pitch -= (e.clientY - this.lastMY) * 0.3;
      this.pitch  = Math.max(-80, Math.min(80, this.pitch));
      this.lastMX = e.clientX;
      this.lastMY = e.clientY;
    };
    this._mu = () => { this.mouseDown = false; };

    window.addEventListener('touchstart', this._ts, { passive: true });
    window.addEventListener('touchmove',  this._tm, { passive: true });
    window.addEventListener('touchend',   this._te, { passive: true });
    window.addEventListener('mousedown',  this._md);
    window.addEventListener('mousemove',  this._mm);
    window.addEventListener('mouseup',    this._mu);
  },

  remove: function () {
    window.removeEventListener('touchstart', this._ts);
    window.removeEventListener('touchmove',  this._tm);
    window.removeEventListener('touchend',   this._te);
    window.removeEventListener('mousedown',  this._md);
    window.removeEventListener('mousemove',  this._mm);
    window.removeEventListener('mouseup',    this._mu);
  },

  tick: function () {
    this.el.object3D.rotation.order = 'YXZ';
    this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this.yaw);
    this.el.object3D.rotation.x = THREE.MathUtils.degToRad(this.pitch);
  }
});

// ===== SPIELER-BEWEGUNG =====
AFRAME.registerComponent('player-movement', {
  init: function () {
    this.speed  = 2.5;   // m/s
    this.joyX   = 0;
    this.joyY   = 0;
    this.keys   = {};
    this.cam    = null;
    this.fwd    = new THREE.Vector3();
    this.right  = new THREE.Vector3();

    // Kollisions-Boxen der Ausstellungsstücke (Sockel + Skulptur)
    // cx/cz = Mittelpunkt, hw/hd = halbe Breite/Tiefe
    this.obstacles = [
      { cx: -2.2, cz: -4,  hw: 0.65, hd: 0.65 },  // Prometheus + Sockel
      { cx:  2.2, cz: -4,  hw: 0.45, hd: 0.45 },  // Ludwig + Sockel
      { cx: -2.2, cz: -1,  hw: 0.45, hd: 0.45 },  // Irene Ludwig + Sockel
      { cx:  2.2, cz: -1,  hw: 0.45, hd: 0.45 },  // Hitler + Sockel
    ];

    this._kd = (e) => { this.keys[e.code] = true; };
    this._ku = (e) => { this.keys[e.code] = false; };
    window.addEventListener('keydown', this._kd);
    window.addEventListener('keyup',   this._ku);
  },

  remove: function () {
    window.removeEventListener('keydown', this._kd);
    window.removeEventListener('keyup',   this._ku);
  },

  // Prüft ob Position (x, z) mit einem Ausstellungsstück kollidiert
  collides: function (x, z) {
    const R = 0.32; // Spieler-Radius
    for (const o of this.obstacles) {
      if (x > o.cx - o.hw - R && x < o.cx + o.hw + R &&
          z > o.cz - o.hd - R && z < o.cz + o.hd + R) {
        return true;
      }
    }
    return false;
  },

  tick: function (time, delta) {
    if (!this.cam) {
      this.cam = this.el.querySelector('[camera]');
      if (!this.cam) return;
    }

    const sec = Math.min(delta / 1000, 0.05);

    let fx = this.joyX;
    let fy = this.joyY;
    if (this.keys['KeyW'] || this.keys['ArrowUp'])    fy = Math.max(fy,  1);
    if (this.keys['KeyS'] || this.keys['ArrowDown'])  fy = Math.min(fy, -1);
    if (this.keys['KeyD'] || this.keys['ArrowRight']) fx = Math.max(fx,  1);
    if (this.keys['KeyA'] || this.keys['ArrowLeft'])  fx = Math.min(fx, -1);
    if (fx === 0 && fy === 0) return;

    // Kamera-Richtung aus touch-look
    const tl = this.cam.components && this.cam.components['touch-look'];
    const yaw = tl ? THREE.MathUtils.degToRad(tl.yaw) : this.cam.object3D.rotation.y;
    this.fwd.set(-Math.sin(yaw), 0, -Math.cos(yaw));
    this.right.set( Math.cos(yaw), 0, -Math.sin(yaw));

    const p   = this.el.object3D.position;
    const dx  = (this.right.x * fx + this.fwd.x * fy) * this.speed * sec;
    const dz  = (this.right.z * fx + this.fwd.z * fy) * this.speed * sec;

    // Raumgrenzen-Clamp-Helfer
    const cx = x => Math.max(-4.5, Math.min( 4.5, x));
    const cz = z => Math.max(-6.4, Math.min( 6.4, z));

    const nx = cx(p.x + dx);
    const nz = cz(p.z + dz);

    if (!this.collides(nx, nz)) {
      // Kein Hindernis → frei bewegen
      p.x = nx;
      p.z = nz;
    } else if (!this.collides(nx, p.z)) {
      // Nur X-Bewegung möglich (entlang Hindernis gleiten)
      p.x = nx;
    } else if (!this.collides(p.x, nz)) {
      // Nur Z-Bewegung möglich (entlang Hindernis gleiten)
      p.z = nz;
    }
    // sonst: komplett blockiert, keine Bewegung
  }
});
</script>

<a-scene

  background="color: #111111"
  loading-screen="dotsColor: #d4b96a; backgroundColor: #1a1a1a"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <!-- ===== ASSETS ===== -->
  <a-assets timeout="60000">
    <img id="img-battleship" src="img/Konig-class_battleship_at_Jutland,_Claus_Bergen.jpg">
    <img id="img-breker"     src="img/Arno_Breker(1).jpg">

  <!-- signal-1  531×376  ratio 1.412 → w=2.12 h=1.50 -->

  <!-- ===== SKULPTUREN + SOCKEL =====

    SOCKEL-SCHEMA:
    - Vollkörper-Figur: flache Plattform (0.9×0.12×0.9) → Figur steht auf dem Boden
    - Büsten/Köpfe: Säule (0.45×1.1×0.45) + Abschlussplatte (0.55×0.06×0.55)
      Büste sitzt auf y=1.16 → Kopfmitte ca. y=1.3-1.4 = etwas unter Augenhöhe (1.6m) ✓

    SCALE-ANPASSUNG:
    - Prometheus (Vollkörper, scale 1 1 1): falls Figur zu groß/klein → z.B. scale="0.5 0.5 0.5"
    - Büsten (scale 0.3 0.3 0.3): falls Kopf zu groß/klein → scale anpassen
  -->

  <!-- PROMETHEUS (Vollkörper) – hinten links -->

    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <!-- Platzhalter während des Ladens -->

    color="#d4b96a" width="2" side="double"></a-text>

    rotation="0 25 0"
  ></a-entity>
  <a-box position="-2.2 1.0 -4" width="0.7" height="2.0" depth="0.7"
    material="opacity:0; transparent:true; side:double"
    class="klickbar" data-info="prometheus"></a-box>

  <!-- LUDWIG (Büste) – hinten rechts -->
  <a-box position=" 2.2 0.55 -4" width="0.45" height="1.10" depth="0.45"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <a-box position=" 2.2 1.13 -4" width="0.58" height="0.06" depth="0.58"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <!-- Platzhalter während des Ladens -->
  <a-box id="ph-ludwig" position=" 2.2 1.42 -4" width="0.30" height="0.45" depth="0.30"
    material="color:#b0a898; opacity:0.35; transparent:true"></a-box>
  <a-text id="pht-ludwig" value="Lädt…" position=" 2.2 1.85 -4" align="center"
    color="#d4b96a" width="2" side="double"></a-text>
  <a-entity id="sc-ludwig"
    gltf-model="url(3d/Meshy_AI_Ludwig_0409172157_generate.glb)"
    position=" 2.2 1.16 -4"
    scale="0.3 0.3 0.3"
    rotation="0 -20 0"
  ></a-entity>
  <a-box position=" 2.2 1.42 -4" width="0.5" height="0.6" depth="0.5"
    material="opacity:0; transparent:true; side:double"
    class="klickbar" data-info="ludwig"></a-box>

  <!-- IRENE LUDWIG (Büste) – mitte links -->
  <a-box position="-2.2 0.55 -1" width="0.45" height="1.10" depth="0.45"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <a-box position="-2.2 1.13 -1" width="0.58" height="0.06" depth="0.58"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <!-- Platzhalter während des Ladens -->
  <a-box id="ph-irene" position="-2.2 1.42 -1" width="0.30" height="0.45" depth="0.30"
    material="color:#b0a898; opacity:0.35; transparent:true"></a-box>
  <a-text id="pht-irene" value="Lädt…" position="-2.2 1.85 -1" align="center"
    color="#d4b96a" width="2" side="double"></a-text>
  <a-entity id="sc-irene"
    gltf-model="url(3d/Meshy_AI_irene_udlwig_0409173602_generate.glb)"
    position="-2.2 1.16 -1"
    scale="0.3 0.3 0.3"
    rotation="0 35 0"
  ></a-entity>
  <a-box position="-2.2 1.42 -1" width="0.5" height="0.6" depth="0.5"
    material="opacity:0; transparent:true; side:double"
    class="klickbar" data-info="irene"></a-box>

  <!-- ADOLF HITLER (Büste, historisch) – mitte rechts -->
  <a-box position=" 2.2 0.55 -1" width="0.45" height="1.10" depth="0.45"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <a-box position=" 2.2 1.13 -1" width="0.58" height="0.06" depth="0.58"
    material="color:#f2f2f2; roughness:0.6; metalness:0"></a-box>
  <!-- Platzhalter während des Ladens -->
  <a-box id="ph-hitler" position=" 2.2 1.42 -1" width="0.30" height="0.45" depth="0.30"
    material="color:#b0a898; opacity:0.35; transparent:true"></a-box>
  <a-text id="pht-hitler" value="Lädt…" position=" 2.2 1.85 -1" align="center"
    color="#d4b96a" width="2" side="double"></a-text>
  <a-entity id="sc-hitler"
    gltf-model="url(3d/Meshy_AI_AdolfHitler_0409172916_generate.glb)"
    position=" 2.2 1.16 -1"
    scale="0.3 0.3 0.3"
    rotation="0 -35 0"
  ></a-entity>
  <a-box position=" 2.2 1.42 -1" width="0.5" height="0.6" depth="0.5"
    material="opacity:0; transparent:true; side:double"
    class="klickbar" data-info="hitler"></a-box>

  <!-- ===== KAMERA-RIG =====
    Rig auf Bodenhöhe (y=0) – wird vom player-movement-Komponent bewegt.
    Kamera auf Augenhöhe eines 1,80m Menschen (y=1.60) innerhalb des Rigs.
    Startposition: Eingang (Südseite), schaut nach Norden.
  -->
  <a-entity id="rig" position="0 0 5.5" player-movement>
    <a-camera id="cam"
      position="0 1.60 0"
      look-controls="enabled: false"
      touch-look
      wasd-controls="enabled: false"
      near="0.05"
      far="30"
    >
    </a-camera>
  </a-entity>

</a-scene>

<script>
  // ===== JOYSTICK =====
  const rig = document.getElementById('rig');

  const joystick = nipplejs.create({
    zone:        document.getElementById('joystick-zone'),
    mode:        'dynamic',
    color:       'rgba(212,185,106,0.7)',
    size:        90,
    restOpacity: 0.4,
  });

  joystick.on('move', (_, data) => {
    const comp = rig.components && rig.components['player-movement'];
    if (!comp) return;
    const a = data.angle.radian;
    const f = Math.min(data.force, 1);
    comp.joyX =  Math.cos(a) * f;
    comp.joyY =  Math.sin(a) * f;
  });

  joystick.on('end', () => {
    const comp = rig.components && rig.components['player-movement'];
    if (comp) { comp.joyX = 0; comp.joyY = 0; }
  });

  // Desktop vs. Mobile Hint
  if (!('ontouchstart' in window)) {
    document.getElementById('hint-mobile').style.display  = 'none';
  } else {
    document.getElementById('hint-desktop').style.display = 'none';
  }

  // ===== SKULPTUREN AUTOMATISCH AUF SOCKELN ZENTRIEREN =====
  // Berechnet die tatsächliche Bounding Box jedes geladenen Modells und
  // verschiebt es so, dass es exakt mittig auf seinem Sockel steht.
  const sculptures = [
    { id: 'sc-prometheus', px: -2.2, py: 0.12, pz: -4  },
    { id: 'sc-ludwig',     px:  2.2, py: 1.16, pz: -4  },
    { id: 'sc-irene',      px: -2.2, py: 1.16, pz: -1  },
    { id: 'sc-hitler',     px:  2.2, py: 1.16, pz: -1  },
  ];

  let geladen = 0;
  const gesamt = sculptures.length;
  const balken = document.getElementById('lade-balken');
  const ladeText = document.getElementById('lade-text');
  const ladescreen = document.getElementById('ladescreen');

  sculptures.forEach(({ id, px, py, pz }) => {
    const el = document.getElementById(id);
    if (!el) return;

    el.addEventListener('model-loaded', () => {
      // Platzhalter entfernen
      const suffix = id.replace('sc-', '');
      const ph  = document.getElementById('ph-'  + suffix);
      const pht = document.getElementById('pht-' + suffix);
      if (ph)  ph.remove();
      if (pht) pht.remove();

      // Ladebalken updaten
      geladen++;
      balken.style.width = (geladen / gesamt * 100) + '%';
      ladeText.textContent = geladen < gesamt
        ? `Skulpturen werden geladen… (${geladen}/${gesamt})`
        : 'Bereit!';
      if (geladen === gesamt) {
        setTimeout(() => ladescreen.classList.add('fertig'), 400);
      }

      // Welt-Matrix aktualisieren (berücksichtigt Position, Rotation, Scale)
      el.object3D.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(el.object3D);
      if (box.isEmpty()) return;

      const center = box.getCenter(new THREE.Vector3());

      // Verschiebung: Modell-Mitte → Sockel-Mitte (X, Z)
      //              Modell-Boden → Sockel-Oberkante (Y)
      el.object3D.position.x += px - center.x;
      el.object3D.position.z += pz - center.z;
      el.object3D.position.y += py - box.min.y;
    });
  });

  // ===== INFO-PANEL =====
  const infos = {
    'battleship': {
      titel: 'König-Klasse Schlachtschiffe bei Skagerrak',
      text: 'Claus Bergen (1885–1964) war einer der bedeutendsten deutschen Marinemaler. Das Gemälde zeigt Schlachtschiffe der König-Klasse in der Seeschlacht am Skagerrak (31. Mai 1916) – der größten Seeschlacht des Ersten Weltkriegs zwischen der deutschen Hochseeflotte und der britischen Grand Fleet.',
      bild: null
    },
    'breker-portrait': {
      titel: 'Arno Breker – Porträt',
      text: 'Arno Breker (1900–1991) war ein deutscher Bildhauer und Architekt. Unter dem Nationalsozialismus wurde er zum bevorzugten Künstler des Regimes und schuf monumentale Skulpturen für Repräsentationsbauten. Nach 1945 arbeitete er als freier Bildhauer weiter und erhielt zahlreiche internationale Aufträge.',
      bild: null
    },
    'breker-pferd': {
      titel: 'Mann mit Pferd (1982)',
      text: 'Arno Breker schuf diese Bronzeplastik 1982. Die Darstellung eines nackten männlichen Aktes mit Pferd ist ein klassisches Motiv, das Breker sein ganzes Leben lang beschäftigte – inspiriert von der griechisch-römischen Antike und dem deutschen Idealismus des 19. Jahrhunderts.',
      bild: null
    },
    'signal-1': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'signal-2': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'signal-3': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'signal-4': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'signal-5': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'signal-6': { titel: 'Exponat', text: '– Informationstext folgt –', bild: null },
    'prometheus': {
      titel: 'Prometheus',
      text: 'Prometheus ist eine Gestalt aus der griechischen Mythologie. Als Titan stahl er das Feuer vom Olymp und brachte es den Menschen – als Symbol für Aufklärung, Fortschritt und die Kühnheit des Denkens. Zeus bestrafte ihn dafür mit ewiger Qual: angekettet an einen Felsen ließ er täglich einen Adler seine nachwachsende Leber fressen.',
      bild: 'infoimg/sc-prometheus-original.jpg'
    },
    'ludwig': {
      titel: 'Peter Ludwig',
      text: 'Peter Ludwig (1925–1996) war ein deutscher Unternehmer, Kunstsammler und Mäzen. Gemeinsam mit seiner Frau Irene baute er eine der bedeutendsten Kunstsammlungen Europas auf. Er stiftete Werke an zahlreiche Museen weltweit, darunter das Ludwig Museum in Köln. Die Büste wurde von Arno Breker geschaffen.',
      bild: 'infoimg/sc-ludwig-original.jpg'
    },
    'irene': {
      titel: 'Irene Ludwig',
      text: 'Irene Ludwig (1927–2010) war eine deutsche Mäzenin und Kunstsammlerin. Gemeinsam mit ihrem Mann Peter Ludwig baute sie eine der bedeutendsten Kunstsammlungen Europas auf und stiftete zahlreiche Werke an Museen in Deutschland, Österreich und weltweit.',
      bild: 'infoimg/sc-irene-original.jpg'
    },
    'hitler': {
      titel: 'Adolf Hitler',
      text: 'Adolf Hitler (1889–1945) war Führer des nationalsozialistischen Deutschlands (1933–1945). Sein Regime verübte den Holocaust und löste den Zweiten Weltkrieg aus, der über 70 Millionen Todesopfer forderte. Er gilt als einer der größten Verbrecher der Geschichte.',
      bild: 'infoimg/sc-hitler-original.jpg'
    },
  };

  const panel     = document.getElementById('info-panel');
  const panelImg  = document.getElementById('info-img');
  const panelTitel= document.getElementById('info-titel');
  const panelText = document.getElementById('info-text');
  const klickHint = document.getElementById('klick-hint');
  let hintTimer   = null;

  document.getElementById('info-close').addEventListener('click', () => {
    panel.classList.remove('offen');
  });

  function zeigeInfo(key) {
    const info = infos[key];
    if (!info) return;
    panelTitel.textContent = info.titel;
    panelText.textContent  = info.text;
    if (info.bild) {
      panelImg.src = info.bild;
      panelImg.style.display = 'block';
    } else {
      panelImg.style.display = 'none';
    }
    panel.classList.add('offen');
  }

  // Maus-Raycasting für direkte Mauszeiger-Interaktion
  const sceneEl = document.querySelector('a-scene');
  const threeRay = new THREE.Raycaster();
  const mouse2d  = new THREE.Vector2();

  function raycastMouse(clientX, clientY) {
    const canvas = sceneEl.canvas;
    if (!canvas) return null;
    const rect = canvas.getBoundingClientRect();
    mouse2d.x = ((clientX - rect.left) / rect.width)  *  2 - 1;
    mouse2d.y = ((clientY - rect.top)  / rect.height) * -2 + 1;
    const camObj = document.getElementById('cam').getObject3D('camera');
    if (!camObj) return null;
    threeRay.setFromCamera(mouse2d, camObj);

    const meshes = [];
    document.querySelectorAll('.klickbar').forEach(el => {
      el.object3D && el.object3D.traverse(obj => {
        if (obj.isMesh) meshes.push({ mesh: obj, el });
      });
    });
    const hits = threeRay.intersectObjects(meshes.map(m => m.mesh), false);
    if (!hits.length) return null;
    const found = meshes.find(m => m.mesh === hits[0].object);
    return found ? found.el : null;
  }

  sceneEl.addEventListener('loaded', () => {
    const canvas = sceneEl.canvas;
    canvas.addEventListener('click', (e) => {
      const el = raycastMouse(e.clientX, e.clientY);
      if (el) zeigeInfo(el.dataset.info);
    });
    canvas.addEventListener('mousemove', (e) => {
      const el = raycastMouse(e.clientX, e.clientY);
      canvas.style.cursor = el ? 'pointer' : 'default';
      if (el) {
        klickHint.classList.add('sichtbar');
        clearTimeout(hintTimer);
      } else {
        hintTimer = setTimeout(() => klickHint.classList.remove('sichtbar'), 200);
      }
    });
  });

  // ===== ZOOM (Doppelklick / Doppeltippen) =====
  const FOV_NORMAL = 80;
  const FOV_ZOOM   = 38;
  let zoomed      = false;
  let fovCurrent  = FOV_NORMAL;
  let fovTarget   = FOV_NORMAL;
  let zoomRaf     = null;

  function animateFov() {
    const cam = document.getElementById('cam');
    if (!cam) return;
    fovCurrent += (fovTarget - fovCurrent) * 0.15;
    cam.setAttribute('camera', 'fov', fovCurrent);
    if (Math.abs(fovTarget - fovCurrent) > 0.1) {
      zoomRaf = requestAnimationFrame(animateFov);
    } else {
      cam.setAttribute('camera', 'fov', fovTarget);
    }
  }

  function toggleZoom() {
    zoomed    = !zoomed;
    fovTarget = zoomed ? FOV_ZOOM : FOV_NORMAL;
    if (zoomRaf) cancelAnimationFrame(zoomRaf);
    zoomRaf = requestAnimationFrame(animateFov);
  }

  // Scrollrad (Desktop)
  window.addEventListener('wheel', (e) => {
    fovTarget = Math.max(20, Math.min(FOV_NORMAL, fovTarget + e.deltaY * 0.05));
    zoomed = fovTarget < FOV_NORMAL;
    if (zoomRaf) cancelAnimationFrame(zoomRaf);
    zoomRaf = requestAnimationFrame(animateFov);
  }, { passive: true });

  // Doppeltippen (Mobile) – nur rechte Hälfte damit Joystick nicht stört
  let lastTap = 0;
  window.addEventListener('touchend', (e) => {
    const t = e.changedTouches[0];
    if (t.clientX < window.innerWidth * 0.45) return; // Joystick-Zone ignorieren
    const now = Date.now();
    if (now - lastTap < 300) toggleZoom();
    lastTap = now;
  }, { passive: true });
</script>

</body>
